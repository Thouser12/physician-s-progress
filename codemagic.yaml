workflows:
  ios-workflow:
    name: Uberlingen iOS (Doctor)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic App Store Connect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.uberlingen.doctor
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 0000000000
        VITE_SUPABASE_URL: "https://cvegqdvpogmntygdjjvi.supabase.co"
        VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2ZWdxZHZwb2dtbnR5Z2RqanZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjQ0MzcsImV4cCI6MjA4ODYwMDQzN30.SiyH5cuKWild1qxTcbr4h34M_Z-JiaS_iceeaA9HgQY"
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events: [push, tag]
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: 'v*.*.*'
          include: true
    scripts:
      - name: Install deps
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Fetch signing files
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users

  android-workflow:
    name: Uberlingen Android (Doctor)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - uberlingen_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "app.uberlingen.doctor"
        VITE_SUPABASE_URL: "https://cvegqdvpogmntygdjjvi.supabase.co"
        VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2ZWdxZHZwb2dtbnR5Z2RqanZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjQ0MzcsImV4cCI6MjA4ODYwMDQzN30.SiyH5cuKWild1qxTcbr4h34M_Z-JiaS_iceeaA9HgQY"
      node: 20
    triggering:
      events: [push, tag]
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: 'v*.*.*'
          include: true
    scripts:
      - name: Install deps
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
